<body>
<div class="site-wrapper">

  <!-- ═══════════════════ SIDEBAR ═══════════════════ -->
  <aside class="sidebar">
    <img id="sidebar-photo" class="sidebar-photo" src="" alt="">

    <div class="sidebar-info">
      <div id="sidebar-name"   class="sidebar-name"></div>
      <div id="sidebar-title"  class="sidebar-title"></div>
      <div id="sidebar-dept"   class="sidebar-dept"></div>
      <div id="sidebar-institution" class="sidebar-institution"></div>
      <div id="sidebar-location"    class="sidebar-location" style="margin-top:0.25rem"></div>

    <hr class="sidebar-divider">

    <!-- Social / Contact Links (populated by JS) -->
    <div id="sidebar-links" class="sidebar-links"></div>

    <hr class="sidebar-divider">

    <!-- Navigation -->
    <nav class="sidebar-nav">
      <a href="#about">About</a>
      <a href="#news">News</a>
      <a href="#publications">Publications</a>
      <a href="#experience">Experience</a>

    <!-- About -->
    <section class="section" id="about">
      <h2 class="section-title">About</h2>
      <p id="about-bio" class="about-bio"></p>

    <!-- Research Interests -->
    <section class="section" id="interests">
      <h2 class="section-title">Research Interests</h2>
      <ul id="interests-list" class="interest-tags"></ul>

    <section class="section" id="news">

    <section class="section" id="publications">
      <h2 class="section-title">
        Publications
        <a href="https://scholar.google.com/citations?user=-8m6JVAAAAAJ&hl=en" target="_blank" rel="noopener">
          Google Scholar ↗
        </a>
      </h2>
      <div id="pub-list"></div>
      <div id="erdos-note" class="erdos-note" style="display:none"></div>
    </section>

    <!-- Experience -->
    <section class="section" id="experience">
      <h2 class="section-title">Experience</h2>
      <div id="exp-list"></div>
    </section>

    <!-- Education -->
    <section class="section" id="education">
      <h2 class="section-title">Education</h2>
      <div id="edu-list"></div>
    </section>

    <!-- Teaching -->
    <section class="section" id="teaching">
      <h2 class="section-title">Teaching Experience <span style="font-size:0.7rem;font-weight:400;color:var(--text-muted)">[Selected]</span></h2>

    <!-- Professional Services -->

      <h2 class="section-title">Professional Services <span style="font-size:0.7rem;font-weight:400;color:var(--text-muted)">[Selected]</span></h2>
      <div id="services-list"></div>
    </section>

    <!-- Awards -->
    <section class="section" id="awards">
      <h2 class="section-title">Awards &amp; Honors</h2>
      <div id="awards-list"></div>
    </section>
